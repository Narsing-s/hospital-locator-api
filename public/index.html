<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b1020" />
  <title>Hospital Locator</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />

  <!-- Material-like font + icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;600" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="appbar elevate-2">
    <div class="appbar__title">
      <span class="material-symbols-outlined">local_hospital</span>
      <h1>Hospital Locator</h1>
    </div>
    <button class="icon-btn" id="refreshBtn" title="Refresh">
      <span class="material-symbols-outlined">refresh</span>
    </button>
  </header>

  <main>
    <!-- Tabs -->
    <div class="tabs elevate-1" role="tablist" aria-label="Main sections">
      <button class="tab is-active" data-view="search" role="tab" aria-selected="true">
        <span class="material-symbols-outlined">pin_drop</span>
        <span>Search</span>
      </button>
      <button class="tab" data-view="services" role="tab" aria-selected="false">
        <span class="material-symbols-outlined">medical_services</span>
        <span>Services</span>
      </button>
      <button class="tab" data-view="register" role="tab" aria-selected="false">
        <span class="material-symbols-outlined">person_add</span>
        <span>Register</span>
      </button>
      <span class="tab__indicator"></span>
    </div>

    <!-- Views -->
    <section class="view is-active" id="view-search" data-view="search" aria-labelledby="tab-search">
      <div class="card elevate-2 animated-in">
        <h2>Find Hospitals by Pincode</h2>
        <div class="field">
          <label for="pincode">Pincode</label>
          <input id="pincode" inputmode="numeric" pattern="[0-9]*" placeholder="e.g., 531034" />
        </div>
        <button class="btn primary with-ripple" id="btnSearchPincode">
          <span class="material-symbols-outlined">search</span> Search
        </button>

        <div class="results" id="searchResults"></div>
        <div class="skeleton-list" id="searchSkeleton" hidden>
          <div class="sk sk-line"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line"></div>
        </div>
      </div>
    </section>

    <section class="view" id="view-services" data-view="services" aria-labelledby="tab-services">
      <div class="card elevate-2 animated-in">
        <h2>Hospital Services</h2>
        <div class="field">
          <label for="hospitalId">Hospital ID</label>
          <input id="hospitalId" placeholder="e.g., 1" />
        </div>
        <button class="btn primary with-ripple" id="btnGetServices">
          <span class="material-symbols-outlined">list</span> Get Services
        </button>

        <div class="results" id="servicesResults"></div>
        <div class="skeleton-list" id="servicesSkeleton" hidden>
          <div class="sk sk-line"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line"></div>
        </div>
      </div>
    </section>

    <section class="view" id="view-register" data-view="register" aria-labelledby="tab-register">
      <div class="card elevate-2 animated-in">
        <h2>Register Patient</h2>
        <div class="grid">
          <div class="field"><label for="firstName">First name</label><input id="firstName" /></div>
          <div class="field"><label for="lastName">Last name</label><input id="lastName" /></div>
          <div class="field"><label for="age">Age</label><input id="age" inputmode="numeric" pattern="[0-9]*" /></div>
          <div class="field"><label for="gender">Gender</label><input id="gender" placeholder="Male / Female / Other" /></div>
          <div class="field"><label for="phoneNumber">Phone</label><input id="phoneNumber" inputmode="tel" /></div>
          <div class="field"><label for="address">Address</label><input id="address" /></div>
          <div class="field grid-span-2"><label for="gmail">Email</label><input id="gmail" placeholder="gmail or email accepted" /></div>
        </div>

        <button class="btn success with-ripple" id="btnCreatePatient">
          <span class="material-symbols-outlined">save</span> Create
        </button>

        <div class="results" id="registerResults"></div>
        <div class="skeleton-list" id="registerSkeleton" hidden>
          <div class="sk sk-line"></div>
          <div class="sk sk-line"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Floating Action Button -->
  <button class="fab with-ripple" id="fabTop" title="Scroll to top">
    <span class="material-symbols-outlined">vertical_align_top</span>
  </button>

  <!-- Snackbar -->
  <div id="snackbar" class="snackbar" role="status" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
